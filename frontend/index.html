<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LendLoop</title>
    <link rel="icon" type="image/x-icon" href="src\images\ll_no_bg.png" />
    <script>
      (function () {
        try {
          if (localStorage.getItem("lendloop_theme") === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (error) {
          // Ignore storage errors during initial paint.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
