services:
  db:
    image: postgis/postgis:17-3.4
    container_name: lendloop-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lendloop

    ports:
      - "5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql

  backend:
    build:
      context: ../backend/ktor-backend
      dockerfile: Dockerfile

    container_name: lendloop-backend

    depends_on:
      - db

    ports:
      - "8080:8080"

    environment:
      POSTGRES_URL: "jdbc:postgresql://lendloop-db:5432/lendloop"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"

volumes:
  db_data: