postgres:
  url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/lendloop}
  user: ${POSTGRES_USER:postgres}
  password: ${POSTGRES_PASSWORD:postgres}
ktor:
  deployment:
    port: 8080
  application:
    modules:
      - nexus.HttpKt.configureHttp
      - nexus.SerializationKt.configureSerialization
      - nexus.PostgresKt.configurePostgres
      - nexus.RpcKt.configureRpc
      - nexus.ResourcesKt.configureResources
      - nexus.RoutingKt.configureRouting
